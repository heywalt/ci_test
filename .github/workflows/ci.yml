name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Prep Build
        run: bin/package

      - name: Build test image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.test
          load: true
          tags: walt-ui-test:latest
          build-args: |
            OBAN_LICENSE_KEY=${{ secrets.OBAN_LICENSE_KEY }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Save Docker image
        run: docker save walt-ui-test:latest | gzip > /tmp/walt-ui-test.tar.gz

      - name: Upload Docker image
        uses: actions/upload-artifact@v4
        with:
          name: test-image
          path: /tmp/walt-ui-test.tar.gz
          retention-days: 1

  format:
    name: Format
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download Docker image
        uses: actions/download-artifact@v4
        with:
          name: test-image
          path: /tmp

      - name: Load Docker image
        run: docker load < /tmp/walt-ui-test.tar.gz

      - name: Check formatting
        run: docker run --rm walt-ui-test:latest mix format --check-formatted

  credo:
    name: Credo
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download Docker image
        uses: actions/download-artifact@v4
        with:
          name: test-image
          path: /tmp

      - name: Load Docker image
        run: docker load < /tmp/walt-ui-test.tar.gz

      - name: Run Credo
        run: docker run --rm -e MIX_ENV=dev walt-ui-test:latest mix credo --strict

  test:
    name: Test
    needs: build
    runs-on: ubuntu-latest
    services:
      db:
        image: postgres:14.13
        env:
          POSTGRES_HOST_AUTH_METHOD: trust
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Download Docker image
        uses: actions/download-artifact@v4
        with:
          name: test-image
          path: /tmp

      - name: Load Docker image
        run: docker load < /tmp/walt-ui-test.tar.gz

      - name: Run tests
        run: |
          docker run --rm --network host walt-ui-test:latest \
            sh -c "mix ecto.create && mix ecto.migrate && mix test"
